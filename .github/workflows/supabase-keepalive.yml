name: Supabase Keepalive

on:
  schedule:
    # Twice a week to stay under free-tier inactivity window.
    - cron: "0 0 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing SUPABASE_URL secret."
            exit 1
          fi

      - name: Send keepalive ping
        run: |
          STATUS_CODE=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
            "$SUPABASE_URL/auth/v1/health")

          # 200: public health endpoint, 401: auth required but endpoint reached.
          if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "401" ]; then
            echo "Supabase keepalive ping accepted (HTTP $STATUS_CODE)."
            exit 0
          fi

          echo "::error::Unexpected response from Supabase keepalive endpoint (HTTP $STATUS_CODE)."
          exit 1
